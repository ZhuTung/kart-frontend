@if (open()) {
  <div class="dialog-backdrop" (click)="onBackdropClick()">
    <div
      class="dialog-panel"
      role="alertdialog"
      aria-modal="true"
      [attr.aria-labelledby]="'dialog-title'"
      (click)="$event.stopPropagation()"
    >
      <div class="dialog-glow"></div>
      <h2 id="dialog-title" class="dialog-title">{{ title() }}</h2>
      <p class="dialog-message">{{ message() }}</p>
      <div class="dialog-actions">
        <button type="button" class="btn-cancel" [disabled]="confirming()" (click)="onCancel()">
          {{ cancelLabel() }}
        </button>
        <button type="button" class="btn-confirm" [disabled]="confirming()" (click)="onConfirm()">
          @if (confirming()) {
            <span class="spinner"></span> Deleting...
          } @else {
            {{ confirmLabel() }}
          }
        </button>
      </div>
    </div>
  </div>
}
